name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install (all extras)
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[all]"

      - name: Byte-compile all modules
        run: python -m compileall -q mediator

      - name: Import smoke test
        env:
          ANTHROPIC_API_KEY: dummy-key-for-import-only
        run: |
          python - <<'PY'
          import importlib
          # Import-safe modules (no platform token needed at import time).
          # The Slack/Teams adapters build their platform clients at import, so
          # they are covered by compileall above rather than imported here.
          for mod in [
              "mediator.prompts",
              "mediator.session",
              "mediator.commands",
              "mediator.engine",
              "mediator.cli",
              "mediator.mcp_server",
          ]:
              importlib.import_module(mod)
              print("ok:", mod)
          PY
